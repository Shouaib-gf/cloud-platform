- name: Configure Client VM
  hosts: managed
  become: yes

  tasks:
    - name: Wait for cloud-init/boot stabilization
      pause:
        seconds: 1

    - name: Update apt cache
      apt:
        update_cache: yes
        lock_timeout: 15

    - name: Install required packages
      apt:
        name:
          - nodejs
          - npm
          - git
          - curl
        state: present
        lock_timeout: 15
